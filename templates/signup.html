<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign Up — RouteWise</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
  <style>
    .auth-page-wrap {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 16px;
    }
    .auth-brand { display:flex; align-items:center; gap:10px; margin-bottom:32px; text-decoration:none }
    .auth-brand .logo-text { font-family:'Fraunces',serif; font-weight:900; font-size:24px; color:var(--rust) }
    .auth-brand .logo-tag  { font-size:11px; color:var(--ink-3); font-style:italic }
    .pw-strength { height:3px; border-radius:2px; margin-top:6px; transition:all .3s; background:var(--bdr) }
  </style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="page-wrapper auth-page-wrap">

  <a class="auth-brand" href="/">
    <span style="font-size:28px">🗺️</span>
    <div>
      <div class="logo-text">RouteWise</div>
      <div class="logo-tag">AI-powered route optimisation</div>
    </div>
  </a>

  <div class="auth-form-wrap glass" style="padding:36px 32px;max-width:420px;width:100%">
    <h2 style="font-family:'Fraunces',serif;font-size:26px;font-weight:900;color:var(--ink);letter-spacing:-.4px;margin-bottom:4px">Create account ✈️</h2>
    <p style="font-size:13px;color:var(--ink-3);margin-bottom:24px">Start planning smarter routes today</p>

    {% if error %}
    <div class="alert-error" style="margin-bottom:14px">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/signup" autocomplete="off" style="display:flex;flex-direction:column;gap:16px">
      <div class="form-group">
        <label>👤 Username</label>
        <input type="text" name="username" placeholder="e.g. traveller_raj"
               value="{{ request.form.get('username','') }}" required/>
      </div>
      <div class="form-group">
        <label>📧 Email</label>
        <input type="email" name="email" placeholder="you@example.com"
               value="{{ request.form.get('email','') }}" required/>
      </div>
      <div class="form-group">
        <label>🔒 Password</label>
        <input type="password" name="password" id="pwField" placeholder="Min 6 characters" required/>
        <div class="pw-strength" id="pwStrength"></div>
      </div>
      <div class="form-group">
        <label>🔒 Confirm Password</label>
        <input type="password" name="confirm" placeholder="Repeat password" required/>
      </div>
      <button type="submit" class="auth-submit">Create Account →</button>
    </form>

    <div class="auth-divider">or</div>
    <p class="auth-switch">Already have an account? <a href="/login">Log in</a></p>
  </div>

</div>
<script>
const pw=document.getElementById('pwField'),bar=document.getElementById('pwStrength');
pw&&pw.addEventListener('input',()=>{
  const v=pw.value,l=v.length;
  let str=0;
  if(l>=6)str++;if(l>=10)str++;if(/[A-Z]/.test(v))str++;if(/[0-9]/.test(v))str++;if(/[^a-zA-Z0-9]/.test(v))str++;
  const colors=['','#be123c','#b45309','#0d7377','#15803d'];
  const widths =['0%','25%','50%','75%','100%'];
  bar.style.width=widths[str]||'0%';
  bar.style.background=colors[str]||'var(--bdr)';
});
</script>
</body>
</html>
